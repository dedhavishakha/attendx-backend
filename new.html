<div id="heroCarousel" style="position:relative;width:100%;max-width:100vw;overflow:hidden;background:#f5f5f5;">

  <!-- Slide 1 -->
  <div class="crsl-slide" style="display:block;">
    <picture>
      <source media="(max-width:768px)" srcset="https://www.homelivingfurniture.com/data/pagebuilder/promotions/2026/spring-refresh-sale/spring-sale-upholstery1.webp">
      <img src="https://www.homelivingfurniture.com/data/pagebuilder/promotions/2026/spring-refresh-sale/spring-sale-main-banner-2.webp" alt="Spring Sale Upholstery" style="display:block;width:100%;height:auto;">
    </picture>
  </div>

  <!-- Slide 2 -->
  <div class="crsl-slide" style="display:none;">
    <picture>
      <source media="(max-width:768px)" srcset="https://www.homelivingfurniture.com/data/pagebuilder/promotions/2026/spring-refresh-sale/spring-sale-matterss.webp">
      <img src="https://www.homelivingfurniture.com/data/pagebuilder/promotions/2026/spring-refresh-sale/spring-sale-main-banner-3.webp" alt="Spring Sale Mattress" style="display:block;width:100%;height:auto;">
    </picture>
  </div>

  <!-- Slide 3 -->
  <div class="crsl-slide" style="display:none;">
    <picture>
      <source media="(max-width:768px)" srcset="https://www.homelivingfurniture.com/data/pagebuilder/promotions/2026/spring-refresh-sale/spring-sale-dining.webp">
      <img src="https://www.homelivingfurniture.com/data/pagebuilder/promotions/2026/spring-refresh-sale/spring-sale-main-banner-1.webp" alt="Spring Sale Dining" style="display:block;width:100%;height:auto;">
    </picture>
  </div>

  <!-- Left Arrow -->
  <div id="crslLeft" style="position:absolute;top:50%;left:12px;transform:translateY(-50%);z-index:10;background:rgba(255,255,255,0.85);border-radius:50%;width:46px;height:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </div>

  <!-- Right Arrow -->
  <div id="crslRight" style="position:absolute;top:50%;right:12px;transform:translateY(-50%);z-index:10;background:rgba(255,255,255,0.85);border-radius:50%;width:46px;height:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg>
  </div>

  <!-- Dots -->
  <div style="position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10;">
    <div class="crsl-dot" data-index="0" style="width:12px;height:12px;border-radius:50%;border:2px solid #fff;background:#fff;cursor:pointer;"></div>
    <div class="crsl-dot" data-index="1" style="width:12px;height:12px;border-radius:50%;border:2px solid #fff;background:rgba(255,255,255,0.4);cursor:pointer;"></div>
    <div class="crsl-dot" data-index="2" style="width:12px;height:12px;border-radius:50%;border:2px solid #fff;background:rgba(255,255,255,0.4);cursor:pointer;"></div>
  </div>

</div>

<script>
(function(){
  var slides = document.querySelectorAll('#heroCarousel .crsl-slide');
  var dots = document.querySelectorAll('#heroCarousel .crsl-dot');
  var leftBtn = document.getElementById('crslLeft');
  var rightBtn = document.getElementById('crslRight');
  var current = 0;
  var total = slides.length;
  var timer;

  function showSlide(n){
    if(n >= total) n = 0;
    if(n < 0) n = total - 1;
    current = n;

    for(var i = 0; i < total; i++){
      slides[i].style.display = 'none';
      dots[i].style.background = 'rgba(255,255,255,0.4)';
    }

    slides[current].style.display = 'block';
    dots[current].style.background = '#fff';
  }

  function nextSlide(){
    showSlide(current + 1);
  }

  function prevSlide(){
    showSlide(current - 1);
  }

  function startTimer(){
    timer = setInterval(nextSlide, 4000);
  }

  function resetTimer(){
    clearInterval(timer);
    startTimer();
  }

  // Arrow clicks
  rightBtn.onclick = function(){
    nextSlide();
    resetTimer();
  };

  leftBtn.onclick = function(){
    prevSlide();
    resetTimer();
  };

  // Dot clicks
  for(var i = 0; i < dots.length; i++){
    (function(index){
      dots[index].onclick = function(){
        showSlide(index);
        resetTimer();
      };
    })(i);
  }

  // Touch swipe
  var startX = 0;
  var carousel = document.getElementById('heroCarousel');

  carousel.addEventListener('touchstart', function(e){
    startX = e.touches[0].clientX;
  });

  carousel.addEventListener('touchend', function(e){
    var endX = e.changedTouches[0].clientX;
    var diff = startX - endX;

    if(diff > 50){
      nextSlide();
      resetTimer();
    } else if(diff < -50){
      prevSlide();
      resetTimer();
    }
  });

  // Start auto play
  startTimer();

})();
</script>
